---

- name: create HTTP vhost configurations
  when:
    - not running_in_check_mode
  nginx_vhosts:
    vhosts: "{{ nginx_vhosts_http }}"
    template:
      path: "{{ nginx_remote_tmp_directory }}/{{ ansible_facts.fqdn }}"
      http: "{{ nginx_vhost_templates.http }}"
      https: "{{ nginx_vhost_templates.https }}"
    # acme: "{{ nginx_acme }}"
  notify:
    - validate config
    - reload nginx

- name: create HTTPs vhost configurations
  when:
    - not running_in_check_mode
  nginx_vhosts:
    vhosts: "{{ nginx_vhosts_https }}"
    template:
      path: "{{ nginx_remote_tmp_directory }}/{{ ansible_facts.fqdn }}"
      http: "{{ nginx_vhost_templates.http }}"
      https: "{{ nginx_vhost_templates.https }}"
    acme: "{{ nginx_acme }}"
    ignore_missing_certificate: "{{ nginx_ignore_missing_certificate | bool }}"
  notify:
    - validate config
    - reload nginx

...
