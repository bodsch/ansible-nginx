---

nginx_gzip:
  enabled: false

nginx_custom_includes:
  basic_auth_monitoring.conf: |
    # https://nginx.org/en/docs/http/ngx_http_core_module.html#satisfy
    satisfy any;
    # Die IP des HAProxy
    # damit ist es möglich das Jobs, die über den Jenkins aufgerufen werden und gegen
    # die admin URLs (https://admin.*.DOMAIN.TLD/admin/*) gehen
    # ohne Username/Passwort zu nutzen
    # Alle anderen Requests benötigen weiterhin die Authentifizierung via BA
    allow 192.168.0.0/24;
    deny  all;

    auth_basic           "Administrator’s Area";
    auth_basic_user_file "{{ htpasswd_credentials_path }}/.monitoring-passwdfile";

  deny.rules: |
    deny     129.0.0.0;

nginx_logformat:
  main:
    format: |
      '[$time_local]: $remote_addr - $remote_user - "$request" '
       '$status $body_bytes_sent "$http_referer" '
       '"$http_user_agent" "$http_x_forwarded_for"';

  json_combined:
    format: |
      '{'
        '"time_local": "$time_local",'
        '"remote_addr": "$remote_addr",'
        '"remote_user": "$remote_user",'
        '"request": "$request",'
        '"status": "$status",'
        '"body_bytes_sent": "$body_bytes_sent",'
        '"request_time": "$request_time",'
        '"http_referrer": "$http_referer",'
        '"http_user_agent": "$http_user_agent"'
      '}';
  json_full:
    format: |
      '{'
        '"msec": "$msec", '                                           # request unixtime in seconds with a milliseconds resolution
        '"connection": "$connection", '                               # connection serial number
        '"connection_requests": "$connection_requests", '             # number of requests made in connection
        '"pid": "$pid", '                                             # process pid
        '"request_id": "$request_id", '                               # the unique request id
        '"request_length": "$request_length", '                       # request length (including headers and body)
        '"remote_addr": "$remote_addr", '                             # client IP
        '"remote_user": "$remote_user", '                             # client HTTP username
        '"remote_port": "$remote_port", '                             # client port
        '"time_local": "$time_local", '
        '"time_iso8601": "$time_iso8601", '                           # local time in the ISO 8601 standard format
        '"request": "$request", '                                     # full path no arguments if the request
        '"request_uri": "$request_uri", '                             # full path and arguments if the request
        '"args": "$args", '                                           # args
        '"status": "$status", '                                       # response status code
        '"body_bytes_sent": "$body_bytes_sent", '                     # the number of body bytes exclude headers sent to a client
        '"bytes_sent": "$bytes_sent", '                               # the number of bytes sent to a client
        '"http_referer": "$http_referer", '                           # HTTP referer
        '"http_user_agent": "$http_user_agent", '                     # user agent
        '"http_x_forwarded_for": "$http_x_forwarded_for", '           # http_x_forwarded_for
        '"http_x_forwarded_proto": "$http_x_forwarded_proto", '       # http_x_forwarded_proto
        '"http_host": "$http_host", '                                 # the request Host: header
        '"server_name": "$server_name", '                             # the name of the vhost serving the request
        '"request_time": "$request_time", '                           # request processing time in seconds with msec resolution
        '"upstream": "$upstream_addr", '                              # upstream backend server for proxied requests
        '"upstream_connect_time": "$upstream_connect_time", '         # upstream handshake time incl. TLS
        '"upstream_header_time": "$upstream_header_time", '           # time spent receiving upstream headers
        '"upstream_response_time": "$upstream_response_time", '       # time spend receiving upstream body
        '"upstream_response_length": "$upstream_response_length", '   # upstream response length
        '"upstream_cache_status": "$upstream_cache_status", '         # cache HIT/MISS where applicable
        '"ssl_protocol": "$ssl_protocol", '                           # TLS protocol
        '"ssl_cipher": "$ssl_cipher", '                               # TLS cipher
        '"scheme": "$scheme", '                                       # http or https
        '"request_method": "$request_method", '                       # request method
        '"server_protocol": "$server_protocol", '                     # request protocol, like HTTP/1.1 or HTTP/2.0
        '"pipe": "$pipe", '                                           # "p" if request was pipelined, "." otherwise
        '"gzip_ratio": "$gzip_ratio", '
        '"http_cf_ray": "$http_cf_ray" '
      '}';

nginx_global:
  extra_config: ""

nginx_http:

  includes:
    - includes.d/memcached.conf
    - includes.d/global.rules
    - sites-enabled/*.conf

  resolver:
    address: "172.17.0.1 141.1.1.1 valid=60s" # version 1.23.1: ipv4=on ipv6=off"
    timeout: "30s"

  open_log_file_cache: max=100 inactive=20s valid=1m min_uses=2

  memcached:                                              # https://nginx.org/en/docs/http/ngx_http_memcached_module.html
    bind: 10.11.0.11 transparent                           # memcached_bind $remote_addr [transparent|off]
    buffer_size: 4k                                       # memcached_buffer_size 4k|8k;
    connect_timeout: ""                                   # memcached_connect_timeout 60s;
    gzip_flag: ""                                         # memcached_gzip_flag flag;
    next_upstream: ""                                     # memcached_next_upstream error timeout; (error | timeout | invalid_response | not_found | off)
    next_upstream_timeout: ""                             # memcached_next_upstream_timeout 0;
    next_upstream_tries: ""                               # memcached_next_upstream_tries 0;
    # pass: memcached:11211                                 # memcached_pass localhost:11211;  /  unix:/tmp/memcached.socket;
    read_timeout: ""                                      # memcached_read_timeout 60s;
    send_timeout: ""                                      # memcached_send_timeout 60s;
    socket_keepalive: ""                                  # memcached_socket_keepalive on | off;

...
